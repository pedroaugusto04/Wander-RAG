name: Deploy Application

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'data/documents/**'
      - 'scripts/deploy/**'
      - '.github/workflows/deploy.yml'
      - 'Dockerfile'
      - 'pyproject.toml'

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: wander-rag
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wander-rag:latest
  DOCKER_PLATFORMS: ${{ vars.DOCKER_PLATFORMS || 'linux/arm64' }}

jobs:
  deploy:
    name: Build Docker & Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect knowledge base changes
        id: docs_changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -q '^data/documents/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure rsync is available on GitHub runner
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Generate production env file
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          QDRANT_HOST: ${{ vars.QDRANT_HOST || '127.0.0.1' }}
          QDRANT_PORT: ${{ vars.QDRANT_PORT || '6333' }}
          QDRANT_COLLECTION_NAME: ${{ vars.QDRANT_COLLECTION_NAME }}
          APP_LOG_LEVEL: ${{ vars.APP_LOG_LEVEL }}
          APP_HOST: ${{ vars.APP_HOST }}
          APP_PORT: ${{ vars.APP_PORT }}
          RAG_CHUNK_SIZE: ${{ vars.RAG_CHUNK_SIZE }}
          RAG_CHUNK_OVERLAP: ${{ vars.RAG_CHUNK_OVERLAP }}
          RAG_TOP_K: ${{ vars.RAG_TOP_K }}
          RAG_SCORE_THRESHOLD: ${{ vars.RAG_SCORE_THRESHOLD }}
          RAG_CONFIDENCE_NONE_THRESHOLD: ${{ vars.RAG_CONFIDENCE_NONE_THRESHOLD }}
          RAG_CONFIDENCE_LOW_THRESHOLD: ${{ vars.RAG_CONFIDENCE_LOW_THRESHOLD }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_FALLBACK_MODELS: ${{ vars.LLM_FALLBACK_MODELS }}
          LLM_TEMPERATURE: ${{ vars.LLM_TEMPERATURE }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
          EMBEDDING_FALLBACK_MODELS: ${{ vars.EMBEDDING_FALLBACK_MODELS }}
          EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS }}
          EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE }}
          EMBEDDING_MAX_RETRIES: ${{ vars.EMBEDDING_MAX_RETRIES }}
          RAG_EMBEDDING_BATCH_SIZE: ${{ vars.RAG_EMBEDDING_BATCH_SIZE }}
          LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_CLOUD_API_KEY }}
          LLAMA_PARSE_TIER: ${{ vars.LLAMA_PARSE_TIER }}
          RERANKER_ENABLED: ${{ vars.RERANKER_ENABLED }}
          RERANKER_MODEL: ${{ vars.RERANKER_MODEL }}
          RERANKER_TOP_K: ${{ vars.RERANKER_TOP_K }}
          RERANKER_RETRIEVAL_MULTIPLIER: ${{ vars.RERANKER_RETRIEVAL_MULTIPLIER }}
        run: |
          bash scripts/deploy/generate-env.sh .deploy/.env.prod

      - name: Validate generated env file
        run: |
          set -euo pipefail
          test -f .deploy/.env.prod
          grep -q '^TELEGRAM_BOT_TOKEN=' .deploy/.env.prod
          grep -q '^GEMINI_API_KEY=' .deploy/.env.prod
          grep -q '^DATABASE_URL=' .deploy/.env.prod
          grep -q '^QDRANT_HOST=' .deploy/.env.prod
          grep -q '^QDRANT_PORT=' .deploy/.env.prod
          grep -q '^QDRANT_COLLECTION_NAME=' .deploy/.env.prod
          grep -q '^RERANKER_ENABLED=' .deploy/.env.prod
          grep -q '^RAG_CONFIDENCE_NONE_THRESHOLD=' .deploy/.env.prod
          grep -q '^RAG_CONFIDENCE_LOW_THRESHOLD=' .deploy/.env.prod

      - name: Prepare SSH for VPS sync
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" \
            "command -v rsync >/dev/null 2>&1 || { echo 'rsync nao encontrado no servidor remoto'; exit 1; }; mkdir -p ~/$APP_NAME/data/documents ~/$APP_NAME/data/qdrant_storage ~/$APP_NAME/data/qdrant_snapshots"

      - name: Sync deploy assets to VPS
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=yes" \
            .deploy/.env.prod "$SERVER_USER@$SERVER_HOST:~/$APP_NAME/.env.prod"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=yes" \
            docker-compose.prod.yml "$SERVER_USER@$SERVER_HOST:~/$APP_NAME/docker-compose.prod.yml"

      - name: Sync knowledge documents to VPS
        if: steps.docs_changes.outputs.changed == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=yes" \
            data/documents/ "$SERVER_USER@$SERVER_HOST:~/$APP_NAME/data/documents/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.4
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          APP_NAME: ${{ env.APP_NAME }}
          DOCS_CHANGED: ${{ steps.docs_changes.outputs.changed }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOCKER_IMAGE,APP_NAME,DOCS_CHANGED
          script: |
            set -euo pipefail
            mkdir -p ~/${APP_NAME}
            cd ~/${APP_NAME} || exit 1
            
            # Use strict permissions for .env.prod
            chmod 600 .env.prod
            
            echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            sudo docker pull "$DOCKER_IMAGE"
            
            sudo env DOCKER_IMAGE="$DOCKER_IMAGE" docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

            if [ "$DOCS_CHANGED" = "true" ]; then
              sudo docker compose --env-file .env.prod -f docker-compose.prod.yml exec -T app \
                python scripts/ingest_documents.py data/documents/
            fi
            
            # Clean up old images
            sudo docker image prune -f
