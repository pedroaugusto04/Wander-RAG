services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: ${QDRANT_CONTAINER_NAME_PROD:-wander-qdrant-prod}
    restart: always
    network_mode: host
    volumes:
      - ${QDRANT_STORAGE_PATH:-./data/qdrant_storage}:/qdrant/storage
      - ${QDRANT_SNAPSHOTS_PATH:-./data/qdrant_snapshots}:/qdrant/snapshots
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/${QDRANT_PORT:-6333}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_IMAGE}
    container_name: ${APP_CONTAINER_NAME:-wander-jr-prod}
    restart: always
    network_mode: host
    env_file:
      - .env.prod
    volumes:
      - ${HOST_DOCUMENTS_PATH:-./data/documents}:${APP_DOCUMENTS_MOUNT_PATH:-/app/data/documents}
    depends_on:
      qdrant:
        condition: service_healthy
