services:
  # ── Wander Jr Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-wander-jr}
    restart: unless-stopped
    ports:
      - "${APP_BIND_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - ${HOST_DOCUMENTS_PATH:-./data/documents}:${APP_DOCUMENTS_MOUNT_PATH:-/app/data/documents}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── PostgreSQL ──
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-wander-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wander}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wander}
      POSTGRES_DB: ${POSTGRES_DB:-wander_db}
    ports:
      - "${POSTGRES_BIND_PORT:-5436}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wander}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector Database ──
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: ${QDRANT_CONTAINER_NAME:-wander-qdrant}
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:${QDRANT_PORT:-6333}"
      - "${QDRANT_GRPC_PORT:-6334}:${QDRANT_GRPC_PORT:-6334}"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/${QDRANT_PORT:-6333}' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
